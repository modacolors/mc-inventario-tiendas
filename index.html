<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Proveedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== TOKENS ===== */
:root, [data-theme="light"] {
  --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec; --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5; --color-border: #d4d1ca;
  --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4;
  --color-text-inverse: #f9f8f4;
  --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-active: #0f3638;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22; --color-error: #a12c7b;
  --color-warning: #964219;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --font-body: 'Inter', sans-serif;
}
[data-theme="dark"] {
  --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523; --color-border: #393836;
  --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
  --color-text-inverse: #2b2a28;
  --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-active: #1a626b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45; --color-error: #d163a7; --color-warning: #bb653b;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}

/* ===== BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; scroll-behavior: smooth; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base);
  color: var(--color-text); background: var(--color-bg); line-height: 1.6; }
img, svg { display: block; max-width: 100%; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input, textarea, select { font: inherit; color: inherit; }
a, button, [role="button"] { transition: color var(--transition), background var(--transition),
  border-color var(--transition), box-shadow var(--transition); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; } }

/* ===== LAYOUT ===== */
#app { display: flex; flex-direction: column; min-height: 100dvh; }

/* ===== HEADER ===== */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  padding: var(--space-3) var(--space-4);
  display: flex; align-items: center; justify-content: space-between; gap: var(--space-3);
}
.header-brand { display: flex; align-items: center; gap: var(--space-2); }
.header-brand svg { color: var(--color-primary); flex-shrink: 0; }
.brand-name { font-weight: 700; font-size: var(--text-base); color: var(--color-text); letter-spacing: -0.01em; }
.brand-sub { font-size: var(--text-xs); color: var(--color-text-muted); display: none; }
@media (min-width: 400px) { .brand-sub { display: inline; } }
.header-actions { display: flex; align-items: center; gap: var(--space-2); }

/* ===== BUTTONS ===== */
.btn { display: inline-flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; line-height: 1;
  min-height: 44px; border: 1px solid transparent; text-decoration: none; }
.btn-primary { background: var(--color-primary); color: var(--color-text-inverse); }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-primary:active { background: var(--color-primary-active); }
.btn-secondary { background: var(--color-surface-offset); border-color: var(--color-border); color: var(--color-text); }
.btn-secondary:hover { background: var(--color-surface-dynamic); }
.btn-ghost { color: var(--color-text-muted); padding: var(--space-2); min-height: 44px; min-width: 44px;
  border-radius: var(--radius-md); display: inline-flex; align-items: center; justify-content: center; }
.btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }
.btn-danger { background: var(--color-error); color: white; border-color: transparent; }
.btn-danger:hover { filter: brightness(0.9); }
.btn-sm { min-height: 36px; padding: var(--space-1) var(--space-3); font-size: var(--text-xs); }

/* ===== MAIN CONTENT ===== */
.main-content { flex: 1; padding: var(--space-4); max-width: 640px; margin: 0 auto; width: 100%; }

/* ===== ANNOUNCEMENTS ===== */
.announcements { margin-bottom: var(--space-4); }
.announcement-card {
  background: var(--color-primary-highlight);
  border: 1px solid oklch(from var(--color-primary) l c h / 0.25);
  border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-2); position: relative;
}
.announcement-card:last-child { margin-bottom: 0; }
.announcement-icon { font-size: 1rem; margin-right: var(--space-2); }
.announcement-text { font-size: var(--text-sm); color: var(--color-text); flex: 1; }
.announcement-date { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }
.announcement-inner { display: flex; align-items: flex-start; gap: var(--space-2); }

/* ===== SECTION TITLE ===== */
.section-label { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--color-text-muted); margin-bottom: var(--space-3); }

/* ===== SUPPLIER GRID ===== */
.suppliers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(160px, 100%), 1fr));
  gap: var(--space-3); margin-bottom: var(--space-6); }
.supplier-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-xl); padding: var(--space-4); text-align: center;
  cursor: pointer; transition: box-shadow var(--transition), transform var(--transition),
    border-color var(--transition), background var(--transition);
  min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--space-2);
}
.supplier-card:hover { box-shadow: var(--shadow-md); border-color: var(--color-primary); transform: translateY(-1px); }
.supplier-card:active { transform: translateY(0); box-shadow: var(--shadow-sm); }
.supplier-card.selected { background: var(--color-primary-highlight); border-color: var(--color-primary); box-shadow: var(--shadow-sm); }
.supplier-initials {
  width: 40px; height: 40px; border-radius: var(--radius-full);
  background: var(--color-primary); color: var(--color-text-inverse);
  font-weight: 700; font-size: var(--text-sm); display: flex; align-items: center; justify-content: center;
}
.supplier-card.selected .supplier-initials { background: var(--color-primary-active); }
.supplier-name { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); line-height: 1.3; }

/* ===== TEMPLATE VIEW ===== */
.template-section { margin-top: var(--space-2); }
.template-header { display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-3); gap: var(--space-2); flex-wrap: wrap; }
.template-title { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); }
.template-box {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-4);
  font-size: var(--text-sm); line-height: 1.8; white-space: pre-wrap;
  word-break: break-word; min-height: 120px; color: var(--color-text);
  margin-bottom: var(--space-3); box-shadow: var(--shadow-sm);
}
.product-item { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3);
  padding: var(--space-2) 0; border-bottom: 1px dashed var(--color-divider); }
.product-item:last-child { border-bottom: none; }
.product-name { flex: 1; font-size: var(--text-sm); line-height: 1.3; }
.product-qty { width: 60px; text-align: center; padding: var(--space-2); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); background: var(--color-bg); color: var(--color-text); font-size: var(--text-sm); }
.product-qty:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px oklch(from var(--color-primary) l c h / 0.15); }
.copy-feedback { font-size: var(--text-xs); color: var(--color-success); text-align: center;
  height: 20px; transition: opacity var(--transition); opacity: 0; }
.copy-feedback.show { opacity: 1; }

/* ===== MODALS ===== */
.modal-overlay { position: fixed; inset: 0; background: oklch(0.1 0 0 / 0.5);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  padding: var(--space-4); opacity: 0; pointer-events: none; transition: opacity var(--transition); }
@media (min-width: 480px) { .modal-overlay { align-items: center; } }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--color-surface); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 480px; padding: var(--space-6); box-shadow: var(--shadow-lg);
  max-height: 90dvh; overflow-y: auto; transform: translateY(40px);
  transition: transform var(--transition);
}
@media (min-width: 480px) { .modal { border-radius: var(--radius-xl); transform: translateY(0) scale(0.97); } }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-title { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-4); color: var(--color-text); }
.modal-close { float: right; margin-top: -4px; }

/* ===== FORMS ===== */
.form-group { margin-bottom: var(--space-4); }
.form-label { display: block; font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted);
  margin-bottom: var(--space-2); }
.form-input, .form-textarea {
  width: 100%; padding: var(--space-3) var(--space-4); border-radius: var(--radius-md);
  border: 1px solid var(--color-border); background: var(--color-bg);
  font-size: var(--text-sm); color: var(--color-text); min-height: 44px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--color-primary);
  box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.form-textarea { min-height: 140px; resize: vertical; line-height: 1.6; }
.form-hint { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }
.form-actions { display: flex; gap: var(--space-2); justify-content: flex-end; padding-top: var(--space-2); flex-wrap: wrap; }

/* ===== ADMIN PANEL ===== */
.admin-section { margin-bottom: var(--space-6); }
.admin-section-title { font-size: var(--text-base); font-weight: 600; color: var(--color-text);
  margin-bottom: var(--space-3); padding-bottom: var(--space-2); border-bottom: 1px solid var(--color-divider); }
.admin-list { display: flex; flex-direction: column; gap: var(--space-2); }
.admin-list-item {
  display: flex; align-items: center; justify-content: space-between; gap: var(--space-2);
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
}
.admin-list-item-name { font-size: var(--text-sm); font-weight: 500; flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.admin-item-actions { display: flex; gap: var(--space-1); flex-shrink: 0; }
.badge { display: inline-flex; align-items: center; padding: 2px var(--space-2);
  border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600; }
.badge-success { background: color-mix(in oklch, var(--color-success) 15%, var(--color-surface));
  color: var(--color-success); }

/* ===== LOGIN SCREEN ===== */
.login-screen { min-height: 100dvh; display: flex; align-items: center; justify-content: center;
  padding: var(--space-4); background: var(--color-bg); }
.login-card { background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-xl); padding: var(--space-8) var(--space-6);
  width: 100%; max-width: 360px; box-shadow: var(--shadow-md); }
.login-logo { display: flex; justify-content: center; margin-bottom: var(--space-6); }
.login-title { font-size: var(--text-xl); font-weight: 700; text-align: center;
  color: var(--color-text); margin-bottom: var(--space-1); }
.login-sub { font-size: var(--text-sm); color: var(--color-text-muted); text-align: center; margin-bottom: var(--space-6); }
.error-msg { background: color-mix(in oklch, var(--color-error) 12%, var(--color-surface));
  border: 1px solid color-mix(in oklch, var(--color-error) 30%, transparent);
  color: var(--color-error); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm); margin-bottom: var(--space-3); display: none; }
.error-msg.show { display: block; }

/* ===== EMPTY STATE ===== */
.empty-state { display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: var(--space-12) var(--space-8); color: var(--color-text-muted); }
.empty-state svg { color: var(--color-text-faint); margin-bottom: var(--space-4); }
.empty-state h3 { color: var(--color-text); font-size: var(--text-base); margin-bottom: var(--space-2); }
.empty-state p { max-width: 34ch; font-size: var(--text-sm); }

/* ===== BACK BUTTON ===== */
.back-row { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-4); }
.back-btn { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm);
  color: var(--color-text-muted); padding: var(--space-2); margin-left: calc(var(--space-2) * -1);
  border-radius: var(--radius-md); }
.back-btn:hover { color: var(--color-text); background: var(--color-surface-offset); }

/* ===== DIVIDER ===== */
.divider { height: 1px; background: var(--color-divider); margin: var(--space-4) 0; }

/* ===== TABS (admin) ===== */
.tabs { display: flex; gap: var(--space-1); border-bottom: 1px solid var(--color-divider);
  margin-bottom: var(--space-4); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tab-btn { padding: var(--space-2) var(--space-4); font-size: var(--text-sm); font-weight: 500;
  color: var(--color-text-muted); border-bottom: 2px solid transparent; white-space: nowrap;
  margin-bottom: -1px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.tab-btn:hover { color: var(--color-text); }
.tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
.logo-text { font-weight: 800; letter-spacing: -0.02em; color: var(--color-primary); font-family: var(--font-body); }
.login-logo .logo-text { font-size: 2rem; background: var(--color-primary-highlight); padding: var(--space-2) var(--space-4); border-radius: var(--radius-lg); }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// STATE
// ============================================================
let state = {
  view: 'login', // login | home | supplier | admin
  selectedSupplier: null,
  adminTab: 'suppliers', // suppliers | announcements
  editingSupplier: null,
  editingAnnouncement: null,
};

// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = 'https://etwmbnzwypohbgzuftde.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VFic4AI_wjK2fgoo7tnTPw_OtXW2wya';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


let currentStore = null;
let currentUserRole = null; // 'tienda' | 'admin'

async function validateAccess(typedKey) {
  const { data: result, error } = await _supabase.rpc('check_access_key', { key_to_check: typedKey });
  if (!error && result && result.length > 0) return result[0];
  return null;
}


// Data (in-memory)
let data = {
  suppliers: [],
  announcements: [],
  inventory_submissions: [],
};

async function fetchData() {
  const { data: sups, error: err1 } = await _supabase.from('suppliers').select('*').order('name');
  const { data: anns, error: err2 } = await _supabase.from('announcements').select('*').order('created_at', { ascending: false });
  const { data: subs } = await _supabase.from('inventory_submissions').select('*').order('created_at', { ascending: false }).limit(50);
  if (!err1) data.suppliers = sups;
  if (!err2) data.announcements = anns;
  if (subs) data.inventory_submissions = subs;
  render();
}


// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (state.view === 'login') app.innerHTML = renderLogin();
  else if (state.view === 'home') app.innerHTML = renderHome();
  else if (state.view === 'supplier') app.innerHTML = renderSupplier();
  else if (state.view === 'admin') app.innerHTML = renderAdmin();
  attachEvents();
}

// ============================================================
// ICONS
// ============================================================
const icon = {
  mail: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
  logo: `<span class="logo-text">MODACOLORS</span>`,
  sun: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
  moon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  copy: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
  back: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>`,
  admin: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>`,
  edit: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  add: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  logout: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
};

// ============================================================
// VIEWS
// ============================================================
function renderLogin() {
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="login-logo">${icon.logo}</div>
      <h1 class="login-title">Catálogo</h1>
      <p class="login-sub">Acceso para personal</p>
      <div class="error-msg" id="loginError">Clave incorrecta. Intenta de nuevo.</div>
      <div class="form-group">

function renderSupplier() {
  const s = data.suppliers.find(x => x.id === state.selectedSupplier);
  if (!s) { state.view = 'home'; return renderHome(); }
  
  const productsLines = (s.products || '').split('\n');
  const renderedProducts = productsLines.map((line, i) => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    if (trimmed.includes('(0)')) {
      const parts = trimmed.split('(0)');
      return `
        <div class="product-item">
          <span class="product-name">${escHtml(parts[0].trim())}</span>
          <div style="display:flex;align-items:center;gap:4px;">
            <input type="number" class="product-qty" data-index="${i}" min="0" placeholder="0">
            ${parts[1] ? `<span>${escHtml(parts[1])}</span>` : ''}
          </div>
        </div>
      `;
    } else {
      return `<div class="product-item"><span class="product-name">${escHtml(trimmed)}</span></div>`;
    }
  }).join('');

  return `
  <div id="app">
    ${renderHeader()}
    <main class="main-content">

        <button class="back-btn" id="backBtn">${icon.back} Proveedores</button>

// ============================================================
// EVENTS
// ============================================================
function attachEvents() {
  // Theme toggle
  document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      render();
    });
  });

  // Login
  const loginBtn = document.getElementById('loginBtn');
  const storeKey = document.getElementById('storeKey');
  if (loginBtn) {
    const doLogin = async () => {
      const key = storeKey.value.trim();
      loginBtn.disabled = true;
      loginBtn.textContent = 'Verificando...';
      const access = await validateAccess(key);
      if (access) {
        currentStore = access.label;
        currentUserRole = access.role;
        state.view = 'home';
        render();
      } else {
        document.getElementById('loginError').classList.add('show');
        storeKey.value = ''; storeKey.focus();
        loginBtn.disabled = false; loginBtn.textContent = 'Ingresar';
      }
    };
    loginBtn.addEventListener('click', doLogin);
    storeKey.addEventListener('keydown', e => e.key === 'Enter' && doLogin());
    storeKey.focus();
  }

  // Logout
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) logoutBtn.addEventListener('click', () => {
    currentStore = null; state.view = 'login'; render();
  });

  // Supplier cards
  document.querySelectorAll('[data-supplier-id]').forEach(card => {
    card.addEventListener('click', () => {
      state.selectedSupplier = parseInt(card.dataset.supplierId);
      state.view = 'supplier';
      render();
    });
  });

  // Back button
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.addEventListener('click', () => {
    state.view = state.view === 'admin' ? 'home' : 'home';
    state.selectedSupplier = null;
    render();
  });

  // List compilation helper
  const getCompiledText = () => {
    const s = data.suppliers.find(x => x.id === state.selectedSupplier);
    if (!s) return '';
    let resultText = `📦 *INVENTARIO: ${s.name.toUpperCase()}*\n`;
    resultText += `🏪 *TIENDA:* ${currentStore || 'No identificada'}\n`;
    resultText += `📅 *FECHA:* ${new Date().toLocaleDateString()}\n`;
    resultText += `--------------------------\n\n`;
    
    const lines = (s.products || '').split('\n');
    lines.forEach((line, i) => {
      const trimmed = line.trim();
      if (!trimmed) return;
      if (trimmed.includes('(0)')) {
        const input = document.querySelector(`.product-qty[data-index="${i}"]`);
        const val = input && input.value ? input.value : '0';
        resultText += trimmed.replace('(0)', `(${val})`) + '\n';
      } else {
        resultText += trimmed + '\n';
      }
    });
    return resultText.trim();
  };

  // Copy button
  const copyBtn = document.getElementById('copyBtn');
  if (copyBtn) copyBtn.addEventListener('click', () => {
    const s = data.suppliers.find(x => x.id === state.selectedSupplier);
    const text = getCompiledText();
    if (!text || !s) return;
    
    // Save to Supabase DB
    _supabase.from('inventory_submissions').insert([
       { store_name: currentStore || 'Tienda', supplier_name: s.name, content: text }
    ]).then(() => fetchData());
    
    // Send background email using formsubmit free AJAX API
    const emailPayload = {
      _subject: `📦 Inventario: ${s.name} - Tienda ${currentStore || '?'}`,
      _template: 'table',
      "Tienda": currentStore || 'Desconocida',
      "Proveedor": s.name,
      "Inventario": text
    };

    fetch('https://formsubmit.co/ajax/admon.modacolors@gmail.com', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(emailPayload)
    })
    .then(response => {
      if (!response.ok) throw new Error('Error al enviar correo');
      return response.json();
    })
    .then(data => {
      console.log('Correo enviado:', data);
      if (data.success === 'false') {
        alert('Atención: El reporte se guardó en el panel pero el servicio de correos aún no está activado. Favor contactar a soporte.');
      }
    })
    .catch(err => {
      console.error('Error FormSubmit:', err);
      // No bloqueamos al usuario con alertas intrusivas si es un error de conexió ligera
    });

    navigator.clipboard.writeText(text).then(() => {
      const fb = document.getElementById('copyFeedback');
      fb.textContent = '✓ Copiado al portapapeles y Reportado a Administración.';
      fb.classList.add('show');
      setTimeout(() => fb.classList.remove('show'), 4000);
    });
  });

  // Admin button
  const adminBtn = document.getElementById('adminBtn');
  if (adminBtn) adminBtn.addEventListener('click', () => {
    openModal('adminModal');
    setTimeout(() => document.getElementById('adminPass')?.focus(), 50);
  });

  // Admin modal
  const closeAdmin = document.getElementById('closeAdminModal');
  const cancelAdmin = document.getElementById('cancelAdminModal');
  const confirmAdmin = document.getElementById('confirmAdminLogin');
  const adminPass = document.getElementById('adminPass');
  if (closeAdmin) closeAdmin.addEventListener('click', () => closeModal('adminModal'));
  if (cancelAdmin) cancelAdmin.addEventListener('click', () => closeModal('adminModal'));
  if (confirmAdmin) {
    const doAdmin = async () => {
      const pass = adminPass.value.trim();
      confirmAdmin.disabled = true;
      const access = await validateAccess(pass);
      if (access && access.role === 'admin') {
        closeModal('adminModal');
        state.view = 'admin';
        state.adminTab = 'suppliers';
        render();
      } else {
        document.getElementById('adminError').classList.add('show');
        adminPass.value = ''; adminPass.focus();
        confirmAdmin.disabled = false;
      }
    };
    confirmAdmin.addEventListener('click', doAdmin);
    adminPass?.addEventListener('keydown', e => e.key === 'Enter' && doAdmin());
  }

  // Admin modal overlay click
  const adminModal = document.getElementById('adminModal');
  if (adminModal) adminModal.addEventListener('click', e => { if (e.target === adminModal) closeModal('adminModal'); });

  // Admin tabs
  document.querySelectorAll('[data-admin-tab]').forEach(btn => {
    btn.addEventListener('click', () => { state.adminTab = btn.dataset.adminTab; render(); });
  });

  // Add supplier
  const addSupplierBtn = document.getElementById('addSupplierBtn');
  if (addSupplierBtn) addSupplierBtn.addEventListener('click', () => {
    state.editingSupplier = null; render();
    openModal('supplierModal');
    setTimeout(() => document.getElementById('supplierName')?.focus(), 50);
  });

  // Edit supplier
  document.querySelectorAll('[data-edit-supplier]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.editSupplier);
      state.editingSupplier = data.suppliers.find(s => s.id === id);
      render();
      openModal('supplierModal');
      setTimeout(() => document.getElementById('supplierName')?.focus(), 50);
    });
  });

  // Delete supplier
    document.querySelectorAll('[data-delete-supplier]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.deleteSupplier);
        if (confirm('¿Eliminar este proveedor?')) {
          _supabase.from('suppliers').delete().eq('id', id).then(() => fetchData());
        }
      });
    });
  
    // Delete submission
    document.querySelectorAll('[data-delete-submission]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = parseInt(btn.dataset.deleteSubmission);
        if (confirm('¿Eliminar este reporte de inventario permanentemente?')) {
          const { error } = await _supabase.from('inventory_submissions').delete().eq('id', id);
          if (error) {
            alert('Error al eliminar: ' + error.message);
          } else {
            fetchData();
          }
        }
      });
    });

  // Supplier modal save
  const saveSupplierBtn = document.getElementById('saveSupplierBtn');
  if (saveSupplierBtn) saveSupplierBtn.addEventListener('click', () => {
    const name = document.getElementById('supplierName').value.trim();
    const products = document.getElementById('supplierProducts').value.trim();
    if (!name) { alert('El nombre del proveedor es obligatorio.'); return; }
    if (state.editingSupplier) {
      _supabase.from('suppliers').update({ name, products }).eq('id', state.editingSupplier.id).then(() => {
        state.editingSupplier = null; fetchData();
      });
    } else {
      _supabase.from('suppliers').insert([{ name, products }]).then(() => {
        state.editingSupplier = null; fetchData();
      });
    }
  });

  const closeSupplierModal = document.getElementById('closeSupplierModal');
  const cancelSupplierModal = document.getElementById('cancelSupplierModal');
  if (closeSupplierModal) closeSupplierModal.addEventListener('click', () => { state.editingSupplier = null; render(); });
  if (cancelSupplierModal) cancelSupplierModal.addEventListener('click', () => { state.editingSupplier = null; render(); });

  const supplierModal = document.getElementById('supplierModal');
  if (supplierModal) supplierModal.addEventListener('click', e => { if (e.target === supplierModal) { state.editingSupplier = null; render(); } });

  // Add announcement
  const addAnnouncementBtn = document.getElementById('addAnnouncementBtn');
  if (addAnnouncementBtn) addAnnouncementBtn.addEventListener('click', () => {
    state.editingAnnouncement = null; render();
    openModal('announcementModal');
    setTimeout(() => document.getElementById('announcementText')?.focus(), 50);
  });

  // Edit announcement
  document.querySelectorAll('[data-edit-announcement]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.editAnnouncement);
      state.editingAnnouncement = data.announcements.find(a => a.id === id);
      render();
      openModal('announcementModal');
    });
  });

  // Delete announcement
  document.querySelectorAll('[data-delete-announcement]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.deleteAnnouncement);
      if (confirm('¿Eliminar este comunicado?')) {
        _supabase.from('announcements').delete().eq('id', id).then(() => fetchData());
      }
    });
  });

  // Announcement modal save
  const saveAnnouncementBtn = document.getElementById('saveAnnouncementBtn');
  if (saveAnnouncementBtn) saveAnnouncementBtn.addEventListener('click', () => {
    const icon_ = document.getElementById('announcementIcon').value.trim() || '📢';
    const text = document.getElementById('announcementText').value.trim();
    const date = document.getElementById('announcementDate').value.trim();
    if (!text) { alert('El mensaje es obligatorio.'); return; }
    if (state.editingAnnouncement) {
      _supabase.from('announcements').update({ icon: icon_, text, date }).eq('id', state.editingAnnouncement.id).then(() => {
        state.editingAnnouncement = null; fetchData();
      });
    } else {
      _supabase.from('announcements').insert([{ icon: icon_, text, date }]).then(() => {
        state.editingAnnouncement = null; fetchData();
      });
    }
  });

  const closeAnnouncementModal = document.getElementById('closeAnnouncementModal');
  const cancelAnnouncementModal = document.getElementById('cancelAnnouncementModal');
  if (closeAnnouncementModal) closeAnnouncementModal.addEventListener('click', () => { state.editingAnnouncement = null; render(); });
  if (cancelAnnouncementModal) cancelAnnouncementModal.addEventListener('click', () => { state.editingAnnouncement = null; render(); });

  const announcementModal = document.getElementById('announcementModal');
  if (announcementModal) announcementModal.addEventListener('click', e => { if (e.target === announcementModal) { state.editingAnnouncement = null; render(); } });
}

// ============================================================
// HELPERS
// ============================================================
function openModal(id) {
  const el = document.getElementById(id);
  if (el) { el.style.display = 'flex'; requestAnimationFrame(() => el.classList.add('open')); }
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.remove('open'); setTimeout(() => { if (!el.classList.contains('open')) el.style.display = 'none'; }, 200); }
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) { return escHtml(str); }
function initials(name) {
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function getTodayDate() {
  const d = new Date();
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}

  const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
  html.setAttribute('data-theme', isDark ? 'dark' : 'light');
  fetchData();
})();
